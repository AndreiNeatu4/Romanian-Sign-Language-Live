services:
  # "LAST ATTEMPT HIGHLY TRAINED" — latest retrain, 98.89% test acc, 2026-05-11
  sign-language-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: last-attempt-highly-trained:latest
    container_name: last-attempt-highly-trained
    ports:
      - "8000:8000"       # Change left side to expose on a different host port
    volumes:
      # Mount the trained model and data from the parent project (read-only)
      - ../models:/app/models:ro
      - ../data:/app/data:ro
      - ../alphabet:/app/alphabet:ro
      # Mount the frontend so CSS/JS/HTML edits don't require an image rebuild.
      - ./app/static:/app/app/static:ro
    environment:
      MODEL_DIR: /app/models
      DATA_DIR: /app/data
      ALPHABET_DIR: /app/alphabet
      # Expose the GPU to CUDA/PyTorch inside the container.
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # Let MediaPipe / OpenCV / OpenMP use every core of the 12900K.
      # 24 = all logical threads. Lower to 16 if the UI feels starved.
      OMP_NUM_THREADS: "24"
      OPENBLAS_NUM_THREADS: "24"
      MKL_NUM_THREADS: "24"
    # No CPU or memory limits — the container may use the full host (capped only
    # by .wslconfig: 24 cores / 28 GB). GPU is reserved below.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Larger shared-memory segment for PyTorch/MediaPipe worker buffers.
    shm_size: "2gb"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: last-attempt-highly-trained-tunnel
    command: tunnel --no-autoupdate --url http://sign-language-web:8000
    depends_on:
      sign-language-web:
        condition: service_healthy
    restart: unless-stopped
